<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぽぽりんの弾幕避け</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  width: 100%;
  overflow-x: hidden;
}

body {
  background-image: url('背景画像.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  color: #ccc;
  width: 100%;
  overflow-x: hidden;
}

body.mobile-mode {
  align-items: flex-start;
  overflow: hidden;
}

@media (max-width: 600px) {
  body {
    padding: 0;
    margin: 0;
  }
  
  #game-wrap {
    width: 100%; 
    padding: 0;
  }
  
  #canvas-container {
    width: 100%;
    height: 100vh;
    aspect-ratio: auto !important;
    border-radius: 0;
  }
  
  #ui-bar {
    max-width: 100%;
    font-size: 12px;
    padding: 8px;
  }
  
  #item-stock-bar {
    max-width: 100%;
    gap: 4px;
    min-height: 48px;
  }
  
  .item-btn {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }
  
  .item-label {
    font-size: 8px;
  }
}

#home-btn:hover {
  background: rgba(150,150,150,0.5);
  transform: scale(1.05);
}

#retry-btn:hover {
  background: rgba(140,90,220,0.5);
  transform: scale(1.05);
}
#game-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
}
#canvas-container {
  position: relative;
  border: 0.5px solid #444;
  border-radius: 8px;
  overflow: hidden;
  background-image: url('背景画像.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

:root {
  --game-width: 600px;
  --game-height: 560px;
}

body.mobile-mode #canvas-container {
  width: min(360px, 90vw);
  height: auto;
  aspect-ratio: 360 / 630;
  border-radius: 0;
}

@media (orientation: landscape) {
  body.mobile-mode #canvas-container {
    width: min(348px, 90vh * 1.25);
    height: auto;
    aspect-ratio: 348/ 330;
  }
}

@media (max-width: 350px) {
  body.mobile-mode #canvas-container {
    width: 100vw;
    aspect-ratio: 348/ 330;
  }
}

body.mobile-mode #game-wrap {
  width: 100%;
  padding: 0;
  margin: 0;
  overflow: hidden;
}

body.mobile-mode #ui-bar {
  max-width: 100vw;
  font-size: 11px;
}
body.pc-mode #ui-bar-mobile {
  display: none;
}

#ui-bar-mobile {
  display: none; 
  width: 100%;
  padding: 4px 8px;
  font-size: 11px;
  color: #000000;
  justify-content: space-between;
  align-items: center;
}

body.mobile-mode #ui-bar-mobile {
  display: flex;
}

body.mobile-mode #item-stock-bar {
  width: 100%;
  max-width: 100%;
}

body.pc-mode #canvas-container {
  width: 600px;
  height: 560px;
  border-radius: 8px;
}

body.pc-mode #game-wrap {
  width: auto;
  padding: 1rem 0;
}


canvas { display: block; }

#ui-bar {
  width: 100%;
  display: flex;
  padding: 0.5rem 0;
  font-size: 13px;
  color: #888;
}

body.hide-ui #ui-bar {
  display: none !important;
}
body.hide-ui #item-stock-bar {
  display: none !important;
}

body.pc-mode #ui-bar {
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  max-width: 600px;
  gap: 16px;
  padding: 0.5rem 0;
}

body.mobile-mode #ui-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 0; 
  overflow: visible;
  padding: 0;
}

.ui-stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

body.pc-mode #ui-lives {
  display: flex;
  flex-direction: row;
  gap: 4px;
  align-items: center;
}

body.mobile-mode #ui-lives {
  position: fixed;
  top: 8px;
  left: 12px;
  z-index: 100;
}

.life-icon {
  width: 10px;
  height: 10px;
  background: #e87ad4;
  border-radius: 50%;
  display: inline-block;
}

body.pc-mode #ui-score {
  flex-direction: column;
}

body.mobile-mode #ui-score {
  position: fixed;
  top: 16px;
  left: 80px;
  z-index: 100;
}

#ui-score .ui-label {
  font-size: 11px;
  color: #000000;
  font-weight: 400;
}

#ui-score .ui-value {
  font-size: 14px;
  font-weight: 600;
  color: #000000;
}

body.pc-mode #ui-graze {
  flex-direction: column;
}
body.mobile-mode #ui-graze {
  position: fixed;
  top: 72px;
  left: 80px;
  z-index: 100;
}

body.mobile-mode #ui-time,
body.mobile-mode #ui-time {
  position: fixed;
  top: 128px;
  left: 80px;
  z-index: 100;
}

.ui-stat-item .ui-label {
  font-size: 11px;
  color: #000000;
}

.ui-stat-item .ui-value {
  font-size: 12px;
  font-weight: 500;
  color: #000000;
}

#ui-graze .ui-value { color: #7e5200; }
#ui-time .ui-value { color: #00566e; }

#lives-display { display: flex; gap: 4px; align-items: center; }
.life-icon {
  width: 10px; height: 10px;
  background: #e87ad4;
  border-radius: 50%;
  display: inline-block;
}
#score-display { font-size: 14px; font-weight: 500; color: #000000; }
#overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: white;
  gap: 12px;
  text-align: center;
  z-index: 20;
}

#device-select-screen {
  width: 90%;
  max-width: 500px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

#device-select-screen h2 {
  font-size: clamp(20px, 5vw, 28px);
  margin: 0;
}

#device-select-screen p {
  font-size: clamp(12px, 3vw, 14px);
  margin: 0;
}

#device-select-screen > div {
  display: flex;
  gap: clamp(8px, 3vw, 16px);
  flex-wrap: wrap;
  justify-content: center;
}

#device-select-screen button {
  padding: clamp(10px 20px, 2vw, 14px 28px);
  font-size: clamp(12px, 3vw, 15px);
  white-space: nowrap;
}

#device-select-screen > p:last-of-type {
  font-size: clamp(11px, 2.5vw, 13px);
  margin-top: 12px;
}

#overlay h2 { font-size: 20px; font-weight: 500; letter-spacing: 0.05em; }
#overlay p { font-size: 13px; color: #aab; line-height: 1.8; }
#start-btn {
  margin-top: 8px;
  padding: 8px 28px;
  font-size: 14px;
  cursor: pointer;
  border: 0.5px solid rgba(200,160,255,0.6);
  background: rgba(120,80,200,0.3);
  color: #dcd;
  border-radius: 8px;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}
#start-btn:hover { background: rgba(140,90,220,0.5); }
#phase-label {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,220,255,0.7);
  letter-spacing: 0.08em;
  pointer-events: none;
}

#graze-label {
  position: absolute; bottom: 10px; right: 10px;
  font-size: 11px; color: rgba(255,220,180,0.8);
  letter-spacing: 0.06em;
}

#item-stock-bar {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
  width: 100%;
  max-width: 600px;
  padding: 6px 0 4px;
  min-height: 52px;
}
.item-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.item-btn {
  width: 44px; height: 44px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  position: relative;
  color: white;
  user-select: none;
  -webkit-user-select: none;
}
.item-btn:hover { transform: scale(1.08); }
.item-btn.active {
  border-color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}
.item-btn.empty {
  opacity: 0.3;
  cursor: default;
}
.item-btn.empty:hover { transform: none; }
.item-label {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.05em;
  text-align: center;
  white-space: nowrap;
}

#effect-display {
  position: absolute;
  bottom: 32px; left: 8px;
  display: flex; flex-direction: column; gap: 3px;
  pointer-events: none;
}

@media (orientation: landscape) {
  body.mobile-mode #effect-display {
    bottom: 8px;
    left: 100px;  
  }
}

.effect-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  color: #fff;
  letter-spacing: 0.04em;
  animation: badgePulse 1s infinite alternate;
}
@keyframes badgePulse { from { opacity: 0.8; } to { opacity: 1; } }

#stats-screen { display:none; flex-direction:column; align-items:center; gap:10px; }
.stats-row {
  display:flex; justify-content:space-between;
  width:260px; font-size:13px;
  border-bottom:0.5px solid rgba(255,255,255,0.1);
  padding:4px 0; color:#ccc;
}
.stats-row span:last-child { color:#e8d4ff; font-weight:500; }
#stats-btn {
  padding:8px 20px; font-size:13px; cursor:pointer;
  border:0.5px solid rgba(150,150,150,0.5);
  background:rgba(80,80,80,0.3); color:#aaa;
  border-radius:8px; transition:background 0.15s;
}
#stats-btn:hover { background:rgba(120,120,120,0.4); }
#game-start-screen {
  flex-direction: column;
  align-items: center;
  gap: 28px;
  justify-content: center;
  padding: 20px;
}
 
#game-start-screen h2 {
  margin: 0;
  font-size: 26px;   
  font-weight: 600;
  letter-spacing: 0.05em;
}
 
#game-start-screen #game-start-text {
  font-size: 14px;
  color: #7ad4e8;
  font-weight: 500;
  margin: 0;
  text-align: center;
  letter-spacing: 0.04em;
}

.chara-select-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;               
  width: 100%;
}
 
.chara-select-label {
  font-size: 13px;
  color: #aab;
  margin: 0;
  letter-spacing: 0.04em;
}
 
#chara-buttons-container {
  display: flex;
  gap: 16px; 
  justify-content: center;
  flex-wrap: wrap;
  width: 100%;
  max-width: 350px;
  padding: 0 12px;
}
 
#game-start-screen #start-btn {
  margin-top: 12px;
  padding: 12px 48px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.05em;
}

body.pc-mode #logo-container {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 50;
  opacity: 1;
  pointer-events: auto;
}

body.mobile-mode #logo-container {
  display: none;
}

#vstick-zone {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 110px;
  z-index: 10;
  pointer-events: none;
}
body.mobile-mode #vstick-zone {
  display: block;
}

@media (orientation: landscape) {
  body.mobile-mode #vstick-zone {
    top: auto;
    bottom: 0;
    left: auto;
    right: 0;  
    height: 140px;  
    width: 140px;   
  }
}

#vstick-base {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgb(160, 160, 160);
  border: 5.5px solid rgb(56, 56, 56);
  left: 16px; bottom: 16px;
  pointer-events: auto;
  touch-action: none;
}

@media (orientation: landscape) {
  body.mobile-mode #vstick-base {
    left: auto;
    right: 20px;     
    bottom: 20px;    
    transform: none;  
    width: 110px;     
    height: 110px;
  }
  
  body.mobile-mode #vstick-knob {
    width: 46px;
    height: 46px;
  }
}

#vstick-knob {
  position: absolute;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(87, 87, 87, 0.192);
  border: 2.5px solid rgb(24, 24, 24);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: transform 0.05s;
}

@media (orientation: landscape) {
  body.mobile-mode #item-stock-bar {
    display: none;
  }
  body.mobile-mode #item-overlay-bar {
    display: flex;
  }
}

#item-overlay-bar {
  display: none;
  position: fixed;
  right: 6px;
  top: 28px;
  flex-direction: column;
  gap: 5px;
  z-index: 12;
  pointer-events: auto;
}

body.mobile-mode #item-overlay-bar {
  display: flex;
  position: fixed;  
  flex-direction: row;
  left: 50%;  
  transform: translateX(-50%); 
  bottom: auto;
  top: auto;
  width: auto;
  max-width: 200px;
  gap: 10px;
  z-index: 15;
  pointer-events: auto;
  margin-top: 0;
}

@media (orientation: landscape) {
  body.mobile-mode #item-overlay-bar {
    position: fixed;
    top: 214px;
    left: 125px;
    z-index: 100;
    pointer-events: auto;
  }
}

.item-ov-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(2,6,21,0.7);
  font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: white;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.item-ov-btn.active {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.1);
}
.item-ov-btn.empty {
  opacity: 0.3;
}

</style>
</head>
<body>
  <div id="logo-container" style="position:fixed;top:12px;left:12px;z-index:50">
    <img id="logo-img" src="ロゴ.png" alt="ロゴ" style="width: 340px;height: auto;display:block;">
  </div>
  
<div id="game-wrap">
<!-- UIバー-->
<div id="ui-bar">
  <div id="ui-lives" class="ui-stat-item">
    <span id="ui-lives-icon-0" class="life-icon"></span>
    <span id="ui-lives-icon-1" class="life-icon"></span>
    <span id="ui-lives-icon-2" class="life-icon"></span>
  </div>
  <div id="ui-score" class="ui-stat-item">
    <span class="ui-label">SCORE</span>
    <span id="ui-score-val" class="ui-value">0</span>
  </div>
  <div id="ui-graze" class="ui-stat-item">
    <span class="ui-label">かすり</span>
    <span id="ui-graze-val" class="ui-value">0</span>
  </div>
  <div id="ui-time" class="ui-stat-item">
    <span class="ui-label">時間</span>
    <span id="ui-time-val" class="ui-value">00:00</span>
  </div>
</div>

  <!-- アイテムストックUI -->
  <div id="item-stock-bar">
    <div class="item-slot">
      <button class="item-btn empty" id="item-btn-0" onclick="useItem(0)">—</button>
      <div class="item-label" id="item-label-0">空き</div>
    </div>
    <div class="item-slot">
      <button class="item-btn empty" id="item-btn-1" onclick="useItem(1)">—</button>
      <div class="item-label" id="item-label-1">空き</div>
    </div>
    <div class="item-slot">
      <button class="item-btn empty" id="item-btn-2" onclick="useItem(2)">—</button>
      <div class="item-label" id="item-label-2">空き</div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="gc" width="600" height="560"></canvas>
    <div id="info-panel" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px">
  
      <div style="background:#1a0a2a;border:1px solid rgba(200,160,255,0.6);border-radius:12px;padding:30px;max-width:500px;max-height:80%;overflow-y:auto;color:#ccc">
    <h2 id="info-title" style="font-size:20px;color:#e87ad4;margin-bottom:16px;text-align:center;letter-spacing:0.05em"></h2>
    <p id="info-content" style="font-size:14px;line-height:1.8;color:#aab;white-space:pre-wrap;margin-bottom:20px"></p>
    <button id="close-info-btn" style="width:100%;padding:10px;font-size:13px;cursor:pointer;border:0.5px solid rgba(200,160,255,0.6);background:rgba(120,80,200,0.3);color:#dcd;border-radius:8px;transition:background 0.15s">
      閉じる
    </button>
  </div>
</div>

  <div id="gameover-overlay" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;flex-direction:column;align-items:center;justify-content:center;color:rgb(255, 255, 255);gap:12px;text-align:center;z-index:25;background:rgba(0,0,0,0.6)"></div>
  <div id="effect-display" style="position:absolute;bottom:32px;left:8px;display:flex;flex-direction:column;gap:3px;pointer-events:none"></div>
  <div id="vstick-zone">
    <div id="vstick-base">
      <div id="vstick-knob"></div>
    </div>
  </div>  

<div id="item-overlay-bar">
  <button class="item-ov-btn empty" id="item-ov-0" onclick="useItem(0)">—</button>
  <button class="item-ov-btn empty" id="item-ov-1" onclick="useItem(1)">—</button>
  <button class="item-ov-btn empty" id="item-ov-2" onclick="useItem(2)">—</button>
</div>

    <div id="phase-label" style="display:none"></div>
<div id="overlay" style="display:flex">

  <div id="device-select-screen">
    <h2>ぽぽりんで弾幕避け!</h2>
    <p style="font-size:13px;color:#aab;margin-bottom:16px">プレイ環境を選択してね</p>
    
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;justify-content:center">
      <button id="select-pc-btn" style="padding:12px 24px;font-size:14px;cursor:pointer;border:1.5px solid #7ad4e8;background:rgba(122,212,232,0.15);color:#7ad4e8;border-radius:8px;letter-spacing:0.05em;transition:all 0.2s;font-weight:500">
        💻 PC版
      </button>
      <button id="select-mobile-btn" style="padding:12px 24px;font-size:14px;cursor:pointer;border:1.5px solid #e87ad4;background:rgba(232,122,212,0.15);color:#e87ad4;border-radius:8px;letter-spacing:0.05em;transition:all 0.2s;font-weight:500">
        📱 モバイル版（横画面推奨）
      </button>
    </div>

    <p style="font-size:12px;color:#666;margin-bottom:12px">操作: マウス・キーボード・タッチ対応</p>
  </div>

  <div id="settings-and-start-screen" style="display:none;flex-direction:column;align-items:center;gap:20px">
    <h2>ぽぽりんで弾幕避け!</h2>
    <p id="game-start-text" style="font-size:14px;color:#7ad4e8;margin:0;font-weight:500"></p>
    
    <!-- 音量設定 -->
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:#aab;justify-content:center">
      🔊 <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5" style="width:100px;cursor:pointer;">
    </div>
    
    <!-- 統計ボタン -->
    <button id="stats-btn" style="margin-top:8px;padding:8px 20px;font-size:13px;cursor:pointer;border:0.5px solid rgba(150,150,150,0.5);background:rgba(80,80,80,0.3);color:#aaa;border-radius:8px;">統計を見る</button>
    
    <!-- ゲーム開始ボタン -->
    <button id="proceed-to-chara-btn" style="padding:12px 48px;font-size:15px;cursor:pointer;border:0.5px solid rgba(200,160,255,0.6);background:rgba(120,80,200,0.3);color:#dcd;border-radius:8px;letter-spacing:0.04em;transition:background 0.15s;font-weight:500">
      次へ（キャラ選択）
    </button>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px;padding:0 12px">
    <button onclick="showInfoPanel('howToPlay')" style="padding:8px 14px;font-size:12px;cursor:pointer;border:0.5px solid #7ad4e8;background:rgba(122,212,232,0.15);color:#7ad4e8;border-radius:8px;transition:all 0.2s">
      📖 遊び方
    </button>
    <button onclick="showInfoPanel('aboutItems')" style="padding:8px 14px;font-size:12px;cursor:pointer;border:0.5px solid #e87ad4;background:rgba(232,122,212,0.15);color:#e87ad4;border-radius:8px;transition:all 0.2s">

<script>

const STATS_KEY = 'poporin_stats';

function loadStats() {
  try {
    return JSON.parse(localStorage.getItem(STATS_KEY)) || {};
  } catch { return {}; }
}

function saveStats(s) {
  localStorage.setItem(STATS_KEY, JSON.stringify(s));
}

function recordGameResult(finalScore, finalGraze, finalFrames) {
  const s = loadStats();
  const playedSec = Math.floor(finalFrames / 60);
  s.totalScore  = (s.totalScore  || 0) + finalScore;
  s.totalGraze  = (s.totalGraze  || 0) + finalGraze;
  s.totalFrames = (s.totalFrames || 0) + finalFrames;
  s.hiScore     = Math.max(s.hiScore  || 0, finalScore);
  s.hiGraze     = Math.max(s.hiGraze  || 0, finalGraze);
  s.hiFrames    = Math.max(s.hiFrames || 0, finalFrames);
  saveStats(s);
}

function framesToHMS(frames) {
  const total = Math.floor(frames / 60);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const sec = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function framesToMS(frames) {
  const total = Math.floor(frames / 60);
  const m = Math.floor(total / 60);
  const sec = total % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function showStatsScreen() {
  const s = loadStats();
  document.getElementById('st-total-score').textContent = (s.totalScore || 0).toLocaleString();
  document.getElementById('st-hi-score').textContent    = (s.hiScore    || 0).toLocaleString();
  document.getElementById('st-total-graze').textContent = (s.totalGraze || 0).toLocaleString();
  document.getElementById('st-hi-graze').textContent    = (s.hiGraze    || 0).toLocaleString();
  document.getElementById('st-total-time').textContent  = framesToHMS(s.totalFrames || 0);
  document.getElementById('st-hi-time').textContent     = framesToMS(s.hiFrames     || 0);

  document.getElementById('device-select-screen').style.display = 'none';
  document.getElementById('stats-screen').style.display = 'flex';
}

let deviceMode = null; 
let CANVAS_WIDTH = 600;
let CANVAS_HEIGHT = 560;

function setDeviceMode(mode) {
  deviceMode = mode;
  
  if(mode === 'mobile') {
    document.body.classList.add('mobile-mode');
    document.body.classList.remove('pc-mode');

    updateMobileCanvasSize();
  } else {
    CANVAS_WIDTH = 600;
    CANVAS_HEIGHT = 560;
    gameW = CANVAS_WIDTH;
    gameH = CANVAS_HEIGHT;
    canvas.width = gameW;
    canvas.height = gameH;
    document.body.classList.add('pc-mode');
    document.body.classList.remove('mobile-mode');
  }
  
  console.log(`Mode: ${mode} | Canvas: ${gameW}x${gameH}`);
}

let mobileCanvasFixed = false;

function updateMobileCanvasSize() {
  const isPortrait = window.innerWidth < window.innerHeight;
  
  if(isPortrait) {
    gameW = 360;
    gameH = 630;
  } else {
    gameW = 348;
    gameH = 330;
  }
  
  canvas.width = gameW;
  canvas.height = gameH;

  stars = [];
  for(let i = 0; i < 120; i++) {
    stars.push({ 
      x: Math.random()*gameW, 
      y: Math.random()*gameH, 
      s: Math.random()*1.5+0.3, 
      sp: Math.random()*0.4+0.1 
    });
  }
}

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const bgmMenu = document.getElementById('bgm-menu');
const bgmGame = document.getElementById('bgm-game');
let gameW = 600;
let gameH = 560; 

let state = 'idle';
let player, bullets, score, graze, lives, frame, phaseTimer, phase, bossHP, bossMaxHP;
let gameTime = 0;
let bossX, bossY, bossVX, bossColor, bossPattern;
let invincible = 0, deathFlash = 0;
let mouseX = gameW/2, mouseY = gameH - 80;
const keys = {};

function getDifficulty() {
return Math.min(1.0 + (gameTime / 18000) * 2.0, 5.0);
}

let stars = [];

const ITEM_DEFS = {
  invincible: { emoji: '💛', label: '無敵5秒',   color: '#f4c875', duration: 300 },
  hitReduce:  { emoji: '💙', label: '判定縮小8秒', color: '#7ad4e8', duration: 600 },
  scoreDouble:{ emoji: '❤️', label: 'スコア2倍10秒', color: '#e87ad4', duration: 600 },
  clearBullet:{ emoji: '💜', label: '弾消去',     color: '#c87ae8', duration: 0   },
};

let dropItems = [];
let itemStock = [null, null, null];
let activeEffects = {};

let itemSpawnTimer = 0;
const ITEM_SPAWN_INTERVAL = 600;

const itemTypes = Object.keys(ITEM_DEFS);

for(let i = 0; i < 120; i++) {
  stars.push({ x: Math.random()*gameW, y: Math.random()*gameH, s: Math.random()*1.5+0.3, sp: Math.random()*0.4+0.1 });
}

const patterns = [
  { name: 'Spread Shot', color: '#e87ad4', gen: spreadShot },
  { name: 'Ring Burst', color: '#7ad4e8', gen: ringBurst },
  { name: 'Spiral', color: '#d4e87a', gen: spiralShot },
  { name: 'Aimed Barrage', color: '#e8a87a', gen: aimedBarrage },
  { name: 'Laser Curtain', color: '#a87ae8', gen: laserCurtain },
  { name: 'Double Helix', color: '#7ae8a8', gen: doubleHelix },
];


const playerImgs = [new Image(), new Image()];
playerImgs[0].src = 'ぽぽりん.png';
playerImgs[1].src = 'ぽぽりん2.png';
let selectedChara = 0;
let playerImg = playerImgs[0];

function selectChara(index) {
  selectedChara = index;
  playerImg = playerImgs[index];

  for(let i = 0; i < 2; i++) {
    const btn = document.getElementById('chara-btn-' + i);
    if(i === index) {
      btn.style.border = '1.5px solid #e87ad4';
      btn.style.background = 'rgba(232,122,212,0.3)';
      btn.style.color = '#fff';
    } else {
      btn.style.border = '1.5px solid rgba(255,255,255,0.2)';
      btn.style.background = 'rgba(255,255,255,0.05)';
      btn.style.color = '#aab';
    }
  }
}

function initGame() {
  if(deviceMode === 'mobile') {
    mobileCanvasFixed = false;
    updateMobileCanvasSize();
  }

  bgmMenu.pause();
  bgmMenu.currentTime = 0;
  bgmGame.currentTime = 0;
  bgmGame.play();
  player = { x: gameW/2, y: gameH - 80, r: 4, hitR: 4 };

  bullets = [];
  dropItems = [];
  itemStock = [null, null, null];
  activeEffects = {};
  score = 0; graze = 0; lives = 3; frame = 0;
  gameTime = 0;
  phaseTimer = 0; phase = 0;
  bossX = gameW/2; bossY = 100; bossVX = 0.8;
  bossHP = 600; bossMaxHP = 600;
  invincible = 0; deathFlash = 0;
  itemSpawnTimer = 0;
  bossPattern = patterns[0];
  bossColor = bossPattern.color;
  document.body.classList.remove('hide-ui');
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('gameover-overlay').style.display = 'none';
  updateUI();
  updateItemStockUI();
  updateItemOverlayUI()
  updateEffectDisplay();
  
  state = 'play';
}

function addToStock(type) {
  for(let i = 0; i < 3; i++) {
    if(itemStock[i] === null) {
      itemStock[i] = type;
      updateItemStockUI();
      updateItemOverlayUI();
      showPickupFlash(ITEM_DEFS[type]);
      return;
    }
  }
  score += 1000;
}

function useItem(slotIndex) {
  for(let i = 0; i < 3; i++) {
  const btn = document.getElementById('item-btn-' + i);
  const ovBtn = document.getElementById('item-ov-' + i);
  
  if(btn) {
    btn.addEventListener('touchstart', e => {
      e.stopPropagation();  // タッチイベントの伝播を止める
    }, { passive: false });
    btn.addEventListener('touchend', e => {
      e.stopPropagation();
      e.preventDefault();
      useItem(i);
    }, { passive: false });
  }
  
  if(ovBtn) {
    ovBtn.addEventListener('touchstart', e => {
      e.stopPropagation();
    }, { passive: false });
    ovBtn.addEventListener('touchend', e => {
      e.stopPropagation();
      e.preventDefault();
      useItem(i);
    }, { passive: false });
  }
}
  if(state !== 'play') return;
  const type = itemStock[slotIndex];
  if(!type) return;

  const def = ITEM_DEFS[type];
  itemStock[slotIndex] = null;

  if(type === 'clearBullet') {
    score += bullets.length * 50;
    bullets = [];
    spawnClearEffect();
  } else {
    activeEffects[type] = (activeEffects[type] || 0) + def.duration;
  }

  updateItemStockUI();
  updateItemOverlayUI();
  updateEffectDisplay();
}

function updateItemStockUI() {
  for(let i = 0; i < 3; i++) {
    const btn = document.getElementById('item-btn-' + i);
    const lbl = document.getElementById('item-label-' + i);
    const type = itemStock[i];
    if(type) {
      const def = ITEM_DEFS[type];
      btn.textContent = def.emoji;
      btn.className = 'item-btn active';
      btn.style.borderColor = def.color + 'aa';
      btn.style.boxShadow = '0 0 8px ' + def.color + '55';
      lbl.textContent = def.label;
      lbl.style.color = def.color;
    } else {
      btn.textContent = '—';
      btn.className = 'item-btn empty';
      btn.style.borderColor = '';
      btn.style.boxShadow = '';
      lbl.textContent = '空き';
      lbl.style.color = 'rgba(255,255,255,0.3)';
    }
  }
}

function updateItemOverlayUI() {
  for(let i = 0; i < 3; i++) {
    const btn = document.getElementById('item-ov-' + i);
    if(!btn) continue;
    const type = itemStock[i];
    if(type) {
      const def = ITEM_DEFS[type];
      btn.textContent = def.emoji;
      btn.className = 'item-ov-btn active';
      btn.style.borderColor = def.color + 'aa';
      btn.onclick = () => useItem(i);
    } else {
      btn.textContent = '—';
      btn.className = 'item-ov-btn empty';
      btn.style.borderColor = '';
      btn.onclick = null;
    }
  }
}

function updateEffectDisplay() {
  const el = document.getElementById('effect-display');
  el.innerHTML = '';
  for(const [type, rem] of Object.entries(activeEffects)) {
    if(rem <= 0) continue;
    const def = ITEM_DEFS[type];
    const sec = (rem / 60).toFixed(1);
    const badge = document.createElement('div');
    badge.className = 'effect-badge';
    badge.style.background = def.color + 'aa';
    badge.style.border = '1px solid ' + def.color;
    badge.textContent = def.emoji + ' ' + def.label.split('秒')[0] + '  残' + sec + 's';
    el.appendChild(badge);
  }
}

let clearEffectTimer = 0;
function spawnClearEffect() { clearEffectTimer = 40; }

let pickupFlash = null;
function showPickupFlash(def) {
  pickupFlash = { emoji: def.emoji, color: def.color, timer: 60 };
}

function spawnDropItem() {
  const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
  const def = ITEM_DEFS[type];
  dropItems.push({
    type, x: 40 + Math.random() * (gameW - 80), y: -20,
    vy: 1.2 + Math.random() * 0.8,
    vx: (Math.random() - 0.5) * 0.5,
    color: def.color, emoji: def.emoji,
    r: 14, pulse: Math.random() * Math.PI * 2
  });
}

function spreadShot() {
  const d = getDifficulty();
  const interval = Math.max(8, Math.floor(20 / d));
  if(frame % interval === 0) {
    for(let a = -40; a <= 40; a += 8) {
      let rad = (90 + a) * Math.PI / 180;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(rad)*(2.8*d), vy: Math.sin(rad)*(2.8*d), r: 5, color: bossColor, });
    }
  }
  if(frame % 60 === 0) {
    for(let i = 0; i < 24; i++) {
      let a = (i/24)*Math.PI*2;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*1.5, vy: Math.sin(a)*1.5, r: 7, color: '#fff',glow: true });
    }
  }
}

function ringBurst() {
  const d = getDifficulty();
  const interval = Math.max(12, Math.floor(30 / d));
  if(frame % interval === 0) {
    let n = Math.floor((16 + (phase*4)) * Math.min(d, 2.0));
    for(let i = 0; i < n; i++) {
      let a = (i/n)*Math.PI*2 + frame*0.02;
      let sp = (2.2 + (phase*0.3)) * d;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: 4, color: bossColor, });
    }
  }
}

function spiralShot() {
  const d = getDifficulty();
  if(frame % 4 === 0) {
    let a = frame * (0.12 * Math.min(d, 1.8)); 
    let sp = 2.5 * d;
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: 5, color: bossColor});
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a+Math.PI)*sp, vy: Math.sin(a+Math.PI)*sp, r: 5, color: '#f4c875'});
  }
  const aimInterval = Math.max(20, Math.floor(50 / d));
  if(frame % aimInterval === 0) {
    let dx = player.x - bossX, dy = player.y - bossY;
    let len = Math.sqrt(dx*dx+dy*dy);
    bullets.push({ x: bossX, y: bossY+30, vx: dx/len*(3.5*d), vy: dy/len*(3.5*d), r: 6, color: '#fff',aimed: true });
  }
}

function aimedBarrage() {
  const d = getDifficulty();
  const interval = Math.max(5, Math.floor(12 / d));
  if(frame % interval === 0) {
    let dx = player.x - bossX, dy = player.y - bossY;
    let len = Math.sqrt(dx*dx+dy*dy);
    let spread = 0.25;
    for(let i = -2; i <= 2; i++) {
      let angle = Math.atan2(dy, dx) + i * spread;
      let sp = (2.5 + Math.abs(i)*0.2) * d;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(angle)*sp, vy: Math.sin(angle)*sp, r: 5, color: bossColor});
    }
  }
}

function laserCurtain() {
  const d = getDifficulty();
  const interval = Math.max(3, Math.floor(6 / d));
  if(frame % interval === 0) {
    let offset = Math.sin(frame*0.04)*120;
    let cols = Math.floor((7 + phase) * Math.min(d, 1.8));
    for(let i = 0; i < cols; i++) {
      let x = (gameW/(cols))*i + gameW/(cols*2) + offset*0.3;
      bullets.push({ x, y: bossY+30, vx: 0, vy: (2.8+phase*0.4)*d, r: 6, color: bossColor});
    }
  }
  }

  if(frame % 40 === 0) {
    for(let i = 0; i < 20; i++) {
      let a = (i/20)*Math.PI*2;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*3, vy: Math.sin(a)*3, r: 4, color: '#fff', type: 'o', glow: true });
    }
  }

function doubleHelix() {
  const d = getDifficulty();
  const interval = Math.max(2, Math.floor(5 / d));
  if(frame % interval === 0) {
    let a1 = frame * 0.08;
    let a2 = frame * 0.08 + Math.PI;
    let sp = 2.4 * d;
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a1)*sp, vy: Math.sin(a1)*sp, r: 5, color: bossColor});
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a2)*sp, vy: Math.sin(a2)*sp, r: 5, color: '#7ad4e8'});
    const aimInterval = Math.max(8, Math.floor(20 / d));
    if(frame % aimInterval === 0) {
      let dx = player.x - bossX, dy = player.y - bossY;
      let len = Math.sqrt(dx*dx+dy*dy);
      bullets.push({ x: bossX, y: bossY+30, vx: dx/len*(4*d), vy: dy/len*(4*d), r: 4, color: '#f4c875'});
    }
  }
}

function dist(a, b) {
  let dx = a.x-b.x, dy = a.y-b.y;
  return Math.sqrt(dx*dx+dy*dy);
}

function update() {
  if(state !== 'play') return;
  frame++;
  gameTime++;
  phaseTimer++;

  itemSpawnTimer++;
  if(itemSpawnTimer >= ITEM_SPAWN_INTERVAL) {
    itemSpawnTimer = 0;
    spawnDropItem();
  }

  let effectChanged = false;
  for(const type of Object.keys(activeEffects)) {
    activeEffects[type]--;
    if(activeEffects[type] <= 0) { delete activeEffects[type]; effectChanged = true; }
    else effectChanged = true;
  }
  if(effectChanged) updateEffectDisplay();


  player.hitR = activeEffects['hitReduce'] ? 1 : 4;

  let phaseDuration = 400;
  if(phaseTimer > phaseDuration) {
    phaseTimer = 0;
    phase = (phase + 1) % patterns.length;
    bossPattern = patterns[phase];
    bossColor = bossPattern.color;
    bullets = [];
  }

  bossX += bossVX * (1 + phase*0.15);
  if(bossX > gameW - 60 || bossX < 60) bossVX *= -1;
  bossY = 90 + Math.sin(frame*0.02)*20;

  bossHP = Math.max(0, bossHP - 0.15);

  if(bossHP <= 0) {
    bossHP = 600; bossMaxHP = 600;
    score += 5000;
    bullets = [];
    phase = (phase+1) % patterns.length;
    bossPattern = patterns[phase];
    bossColor = bossPattern.color;
  }

  bossPattern.gen();

  for(let di of dropItems) {
    di.x += di.vx; di.y += di.vy;
    di.pulse += 0.08;
    let d = dist(player, di);
    if(d < player.r + di.r) {
      addToStock(di.type);
      di._collected = true;
    }
  }
  dropItems = dropItems.filter(di => !di._collected && di.y < gameH + 30);

  bullets = bullets.filter(b => b.x > -20 && b.x < gameW+20 && b.y > -20 && b.y < gameH+20);
  for(let b of bullets) { b.x += b.vx; b.y += b.vy; }

  let speed = 3.8;
  const up    = keys['ArrowUp']    || keys['KeyW'];
  const down  = keys['ArrowDown']  || keys['KeyS'];
  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const usingKeyboard = up || down || left || right;

  if(vstick.active && (Math.abs(vstick.dx) > 0.05 || Math.abs(vstick.dy) > 0.05)) {
    const vstickSpeed = 3.0;
    player.x += vstick.dx * vstickSpeed;
    player.y += vstick.dy * vstickSpeed;
    mouseX = player.x; mouseY = player.y;
  } else if(usingKeyboard) {
    const diag = (up || down) && (left || right) ? speed / Math.SQRT2 : speed;
    if(up)    player.y -= diag;
    if(down)  player.y += diag;
    if(left)  player.x -= diag;
    if(right) player.x += diag;
    mouseX = player.x; mouseY = player.y;
  } else {
    let dx = mouseX - player.x, dy = mouseY - player.y;
    let d = Math.sqrt(dx*dx+dy*dy);
    if(d > speed) { player.x += dx/d*speed; player.y += dy/d*speed; }
    else { player.x = mouseX; player.y = mouseY; }
  }
  
  player.x = Math.max(12, Math.min(gameW-12, player.x));
  player.y = Math.max(12, Math.min(gameH-12, player.y));

  const isInvincible = invincible > 0 || !!activeEffects['invincible'];
  if(!isInvincible) {
    for(let b of bullets) {
      let dd = dist(player, b);
      if(dd < player.hitR + 2) {
        lives--;
        bullets = [];
        invincible = 120;
        deathFlash = 20;
        updateUI();

        if(lives <= 0) {
          state = 'dead';
          bgmGame.pause();
          recordGameResult(score, graze, gameTime);
          setTimeout(() => {
            showOverlay('ゲームオーバー', `スコア: ${score.toLocaleString()}\nかすり: ${graze}\n時間: ${document.getElementById('ui-time-val').textContent}`, 'もう一度遊ぶ');
          }, 15);
        }

        break;
      } else if(dd < b.r + 14) {
        graze++;
        const scoreAdd = activeEffects['scoreDouble'] ? 20 : 10;
        score += scoreAdd;
        b._grazed = true;
      }
    }
  } else {
    if(invincible > 0) invincible--;
  }

  const baseScore = 1;
  score += activeEffects['scoreDouble'] ? baseScore * 2 : baseScore;
  if(frame % 60 === 0) updateUI();
  if(clearEffectTimer > 0) clearEffectTimer--;
  if(pickupFlash && pickupFlash.timer > 0) pickupFlash.timer--;
}

function updateUI() {

  document.getElementById('ui-score-val').textContent = score.toLocaleString();
  
  document.getElementById('ui-graze-val').textContent = graze;
  
  let seconds = Math.floor(gameTime / 60);
  let minutes = Math.floor(seconds / 60);
  seconds = seconds % 60;
  let timeStr = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  document.getElementById('ui-time-val').textContent = timeStr;
  
  for(let i = 0; i < 3; i++) {
    document.getElementById('ui-lives-icon-' + i).style.opacity = 
      i < Math.max(0, lives) ? '1' : '0.15';
  }
}

function drawBoss() {
  let t = frame;
  ctx.save();
  ctx.translate(bossX, bossY);
  let aura = ctx.createRadialGradient(0,0,10, 0,0,55);
  aura.addColorStop(0, bossColor+'40');
  aura.addColorStop(1, 'transparent');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(0,0,55,0,Math.PI*2); ctx.fill();
  ctx.save();
  ctx.rotate(Math.sin(t*0.03)*0.15);
  for(let s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1);
    ctx.beginPath(); ctx.moveTo(0, -10);
    ctx.bezierCurveTo(40, -40, 80, 0, 50, 30);
    ctx.bezierCurveTo(30, 50, 10, 20, 0, 10);
    ctx.fillStyle = bossColor + '55'; ctx.strokeStyle = bossColor + 'aa'; ctx.lineWidth = 1;
    ctx.fill(); ctx.stroke(); ctx.restore();
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = bossColor; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#1a0a2a';
  ctx.beginPath(); ctx.arc(-5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = bossColor;
  ctx.beginPath(); ctx.arc(-5+Math.sin(t*0.05), -3+Math.cos(t*0.04)*0.5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5+Math.sin(t*0.05), -3+Math.cos(t*0.04)*0.5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 3, 5, 0.1, Math.PI-0.1); ctx.stroke();
  ctx.restore();
  document.getElementById('phase-label').style.display = 'none';
}

function drawPlayer() {
  let t = frame;
  ctx.save();
  ctx.translate(player.x, player.y);

  const invincAnim = invincible > 0 && Math.floor(invincible/4) % 2 === 0;
  if(invincAnim) { ctx.restore(); return; }
  ctx.drawImage(playerImg, -24, -24, 48, 48);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI*2); 
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,60,60,0.9)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, player.hitR, 0, Math.PI*2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,60,60,0.9)';
  ctx.beginPath();
  ctx.arc(0, 0, 1.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawDropItems() {
  for(let di of dropItems) {
    let glow = 0.6 + Math.sin(di.pulse) * 0.4;
    ctx.save();
    ctx.translate(di.x, di.y);
    let aura = ctx.createRadialGradient(0,0,2, 0,0,di.r+6);
    aura.addColorStop(0, di.color + 'aa');
    aura.addColorStop(1, 'transparent');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(0,0,di.r+6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,di.r,0,Math.PI*2);
    ctx.fillStyle = '#1a0a2a';
    ctx.fill();
    ctx.strokeStyle = di.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = di.color; ctx.shadowBlur = 8 * glow;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(di.emoji, 0, 0);
    ctx.restore();
  }
}

function drawBullets() {
  for(let b of bullets) {
    ctx.save();
    if(b._grazed) { ctx.shadowColor = b.color; ctx.shadowBlur = 6; }
    if(b.glow)    { ctx.shadowColor = '#fff';  ctx.shadowBlur = 8; }
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r*0.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawClearEffect() {
  if(clearEffectTimer <= 0) return;
  let p = clearEffectTimer / 40;
  ctx.save();
  ctx.fillStyle = `rgba(180,100,240,${p*0.35})`;
  ctx.fillRect(0,0,gameW,gameH);
  ctx.strokeStyle = `rgba(200,130,255,${p*0.7})`;
  ctx.lineWidth = 2;
  for(let i = 0; i < 12; i++) {
    let a = (i/12)*Math.PI*2;
    let len = (1 - p) * 280 + 20;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x + Math.cos(a)*len, player.y + Math.sin(a)*len);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPickupFlash() {
  if(!pickupFlash || pickupFlash.timer <= 0) return;
  let p = pickupFlash.timer / 60;
  ctx.save();
  ctx.font = `${20 + (1-p)*10}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = p;
  ctx.shadowColor = pickupFlash.color; ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  ctx.fillText(pickupFlash.emoji + ' GET!', player.x, player.y - 30 - (1-p)*20);
  ctx.restore();
}

function drawStars() {
  for(let s of stars) {
    s.y += s.sp;
    if(s.y > gameH) s.y = 0;
    ctx.fillStyle = `rgba(255,255,255,${0.3+s.s*0.3})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s*0.6, 0, Math.PI*2); ctx.fill();
  }
}

function drawDeathFlash() {
  if(deathFlash > 0) {
    ctx.fillStyle = `rgba(255,100,180,${deathFlash/20*0.5})`;
    ctx.fillRect(0,0,gameW,gameH);
    deathFlash--;
  }
}

function drawScoreDoubleIndicator() {
  if(!activeEffects['scoreDouble']) return;
  ctx.save();
  ctx.font = 'bold 11px system-ui';
  ctx.fillStyle = '#e87ad4';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = '#e87ad4'; ctx.shadowBlur = 6;
  ctx.fillText('×2 SCORE', gameW - 10, gameH - 36);
  ctx.restore();
}

function render() {
  ctx.clearRect(0,0,gameW,gameH);
  ctx.fillStyle = '#020615';
  ctx.fillRect(0,0,gameW,gameH);
  drawStars();
  if(state === 'play') {
    drawBoss();
    drawBullets();
    drawDropItems();
    drawPlayer();
    drawDeathFlash();
    drawClearEffect();
    drawPickupFlash();
    drawScoreDoubleIndicator();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

const vstickBase = document.getElementById('vstick-base');
const vstickKnob = document.getElementById('vstick-knob');

let vstick = {
  active: false,
  id: null,
  baseX: 0, baseY: 0,   
  dx: 0, dy: 0,          
  radius: 36,            
};

function vstickGetBaseCenter() {
  const r = canvas.getBoundingClientRect();
  const br = vstickBase.getBoundingClientRect();
  const scaleX = gameW / r.width;
  const scaleY = gameH / r.height;
  return {
    x: (br.left + br.width / 2 - r.left) * scaleX,
    y: (br.top + br.height / 2 - r.top) * scaleY,
  };
}

function vstickRepositionOnResize() {
}

vstickBase.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state !== 'play') return;
  const t = e.changedTouches[0];
  vstick.active = true;
  vstick.id = t.identifier;
  const c = vstickGetBaseCenter();
  vstick.baseX = c.x;
  vstick.baseY = c.y;
  vstick.dx = 0; vstick.dy = 0;
}, { passive: false });

vstickBase.addEventListener('touchmove', e => {
  let isStickTouch = false;
  for(const t of e.changedTouches) {
    if(t.identifier === vstick.id) {
      isStickTouch = true;
      break;
    }
  }
  
  if(isStickTouch) e.preventDefault();  
  
  if(!vstick.active) return;
  for(const t of e.changedTouches) {
    if(t.identifier !== vstick.id) continue;
    const r = canvas.getBoundingClientRect();
    const scaleX = gameW / r.width;
    const scaleY = gameH / r.height;
    const tx = (t.clientX - r.left) * scaleX;
    const ty = (t.clientY - r.top)  * scaleY;
    let dx = tx - vstick.baseX;
    let dy = ty - vstick.baseY;
    const len = Math.sqrt(dx*dx + dy*dy);
    const maxLen = vstick.radius;
    if(len > maxLen) { dx = dx/len*maxLen; dy = dy/len*maxLen; }
    vstick.dx = dx / maxLen;
    vstick.dy = dy / maxLen;

    const dispScale = vstickBase.getBoundingClientRect().width / 80; 
    vstickKnob.style.transform = `translate(calc(-50% + ${dx / scaleX * dispScale}px), calc(-50% + ${dy / scaleY * dispScale}px))`;
  }
}, { passive: false });

function vstickEnd(e) {
  e.preventDefault();
  for(const t of e.changedTouches) {
    if(t.identifier === vstick.id) {
      vstick.active = false;
      vstick.dx = 0; vstick.dy = 0;
      vstickKnob.style.transform = 'translate(-50%, -50%)';
    }
  }
}
vstickBase.addEventListener('touchend',    vstickEnd, { passive: false });
vstickBase.addEventListener('touchcancel', vstickEnd, { passive: false });
