<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぽぽりんの弾幕避け</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #00416e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  color: #ccc;
}
#game-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
}
#canvas-container {
  position: relative;
  border: 0.5px solid #444;
  border-radius: 8px;
  overflow: hidden;
  background: #00416e;
}

/* ===== デバイスモード分岐 ===== */
:root {
  --game-width: 480px;
  --game-height: 560px;
  --ui-width: 480px;
  --item-slot-count: 3;
}

/* スマホモード */
body.mobile-mode #canvas-container {
  width: 100vw;
  height: auto;
  aspect-ratio: 9 / 10.5;
  max-width: 100%;
  border-radius: 0;
}

body.mobile-mode #game-wrap {
  width: 100vw;
  padding: 0;
}

body.mobile-mode #ui-bar {
  max-width: 100vw;
  font-size: 11px;
}

body.mobile-mode #item-stock-bar {
  max-width: 100vw;
}

/* PCモード（デフォルト） */
body.pc-mode #canvas-container {
  width: 480px;
  height: 560px;
  border-radius: 8px;
}

body.pc-mode #game-wrap {
  width: auto;
  padding: 1rem 0;
}

canvas { display: block; }
#ui-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 480px;
  padding: 0.5rem 0;
  font-size: 13px;
  color: #888;
}
#lives-display { display: flex; gap: 4px; align-items: center; }
.life-icon {
  width: 10px; height: 10px;
  background: #e87ad4;
  border-radius: 50%;
  display: inline-block;
}
#score-display { font-size: 14px; font-weight: 500; color: #eee; }
#overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(2, 6, 21, 0.85);
  color: white;
  gap: 12px;
  text-align: center;
  z-index: 20;
}
#overlay h2 { font-size: 20px; font-weight: 500; letter-spacing: 0.05em; }
#overlay p { font-size: 13px; color: #aab; line-height: 1.8; }
#start-btn {
  margin-top: 8px;
  padding: 8px 28px;
  font-size: 14px;
  cursor: pointer;
  border: 0.5px solid rgba(200,160,255,0.6);
  background: rgba(120,80,200,0.3);
  color: #dcd;
  border-radius: 8px;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}
#start-btn:hover { background: rgba(140,90,220,0.5); }
#phase-label {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,220,255,0.7);
  letter-spacing: 0.08em;
  pointer-events: none;
}
#boss-bar-wrap {
  position: absolute; top: 8px; left: 8px; right: 8px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
#boss-bar { height: 100%; background: #e87ad4; transition: width 0.2s; border-radius: 2px; }
#graze-label {
  position: absolute; bottom: 10px; right: 10px;
  font-size: 11px; color: rgba(255,220,180,0.8);
  letter-spacing: 0.06em;
}

/* ===== アイテムストックUI ===== */
#item-stock-bar {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
  width: 100%;
  max-width: 480px;
  padding: 6px 0 4px;
  min-height: 52px;
}
.item-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.item-btn {
  width: 44px; height: 44px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  position: relative;
  color: white;
  user-select: none;
  -webkit-user-select: none;
}
.item-btn:hover { transform: scale(1.08); }
.item-btn.active {
  border-color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}
.item-btn.empty {
  opacity: 0.3;
  cursor: default;
}
.item-btn.empty:hover { transform: none; }
.item-label {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.05em;
  text-align: center;
  white-space: nowrap;
}

/* アクティブ効果インジケーター */
#effect-display {
  position: absolute;
  bottom: 32px; left: 8px;
  display: flex; flex-direction: column; gap: 3px;
  pointer-events: none;
}
.effect-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  color: #fff;
  letter-spacing: 0.04em;
  animation: badgePulse 1s infinite alternate;
}
@keyframes badgePulse { from { opacity: 0.8; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="game-wrap">
<div id="ui-bar">
  <div id="lives-display">
  <span class="life-icon" id="l0"></span>
  <span class="life-icon" id="l1"></span>
  <span class="life-icon" id="l2"></span>
</div>
  <div id="score-display">SCORE <span id="score-val">0</span></div>
  <div style="font-size:12px;color:#888">かすり <span id="graze-val" style="color:#f4c875">0</span></div>
  <div style="font-size:12px;color:#888">時間 <span id="time-val" style="color:#7ad4e8">00:00</span></div>
</div>
  <!-- アイテムストックUI -->
  <div id="item-stock-bar">
    <div class="item-slot">
      <button class="item-btn empty" id="item-btn-0" onclick="useItem(0)">—</button>
      <div class="item-label" id="item-label-0">空き</div>
    </div>
    <div class="item-slot">
      <button class="item-btn empty" id="item-btn-1" onclick="useItem(1)">—</button>
      <div class="item-label" id="item-label-1">空き</div>
    </div>
    <div class="item-slot">
      <button class="item-btn empty" id="item-btn-2" onclick="useItem(2)">—</button>
      <div class="item-label" id="item-label-2">空き</div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="gc" width="480" height="560"></canvas>
    <div id="boss-bar-wrap"><div id="boss-bar" style="width:100%"></div></div>
    <div id="phase-label" style="display:none"></div>
    <div id="overlay" style="display:flex">
  <div id="device-select-screen">
    <h2>ぽぽりんで弾幕避け！</h2>
    <p style="font-size:13px;color:#aab;margin-bottom:16px">プレイ環境を選択してください</p>
    
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;justify-content:center">
      <button id="select-pc-btn" style="padding:12px 24px;font-size:14px;cursor:pointer;border:1.5px solid #7ad4e8;background:rgba(122,212,232,0.15);color:#7ad4e8;border-radius:8px;letter-spacing:0.05em;transition:all 0.2s;font-weight:500">
        💻 PC版（480×560）
      </button>
      <button id="select-mobile-btn" style="padding:12px 24px;font-size:14px;cursor:pointer;border:1.5px solid #e87ad4;background:rgba(232,122,212,0.15);color:#e87ad4;border-radius:8px;letter-spacing:0.05em;transition:all 0.2s;font-weight:500">
        📱 モバイル版（フルスクリーン）
      </button>
    </div>

    <p style="font-size:12px;color:#666;margin-bottom:12px">操作: マウス・キーボード・タッチ対応</p>
    
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:#aab;justify-content:center">
      🔊 <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5" style="width:100px;cursor:pointer;">
    </div>
  </div>

  <div id="game-start-screen" style="display:none">
    <h2>ぽぽりんで弾幕避け！</h2>
    <p id="game-start-text" style="font-size:13px;color:#aab;margin-bottom:16px"></p>
    <button id="start-btn" style="padding:10px 28px;font-size:14px;cursor:pointer;border:0.5px solid rgba(200,160,255,0.6);background:rgba(120,80,200,0.3);color:#dcd;border-radius:8px;letter-spacing:0.04em;transition:background 0.15s">
      ゲーム開始
    </button>
  </div>
</div>
    <div id="graze-label" style="display:none">GRAZE <span id="graze-inner">0</span></div>
    <div id="effect-display"></div>
  </div>
</div>

<audio id="bgm" src= "data:audio/mpeg;base64,as==" loop></audio>

<script>
  // ===== デバイスモード管理 =====
let deviceMode = null;  // 'pc' または 'mobile'
let CANVAS_WIDTH = 480;
let CANVAS_HEIGHT = 560;

function detectDeviceDefault() {
  // スマホの判定基準
  return window.innerWidth < 768 && window.matchMedia("(max-width: 768px)").matches;
}

function setDeviceMode(mode) {
  deviceMode = mode;
  
  if(mode === 'mobile') {
    CANVAS_WIDTH = window.innerWidth;
    CANVAS_HEIGHT = window.innerWidth * (560 / 480);  // アスペクト比維持
    document.body.classList.add('mobile-mode');
    document.body.classList.remove('pc-mode');
  } else {
    CANVAS_WIDTH = 480;
    CANVAS_HEIGHT = 560;
    document.body.classList.add('pc-mode');
    document.body.classList.remove('mobile-mode');
  }
  
  // キャンバスの実寸法を更新
  gameW = CANVAS_WIDTH;
  gameH = CANVAS_HEIGHT;
  canvas.width = gameW;
  canvas.height = gameH;
  
  console.log(`Mode: ${mode} | Canvas: ${gameW}x${gameH}`);
}
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const bgm = document.getElementById('bgm');
let gameW = 480;  // ゲーム世界の幅（デバイス選択時に更新）
let gameH = 560;  // ゲーム世界の高さ（デバイス選択時に更新）

let state = 'idle';
let player, bullets, score, graze, lives, frame, phaseTimer, phase, bossHP, bossMaxHP;
let bossX, bossY, bossVX, bossColor, bossPattern;
let invincible = 0, deathFlash = 0;
let mouseX = gameW/2, mouseY = gameH - 80;
let shift = false;
const keys = {};
let stars = [];

// ===== アイテム定義 =====
const ITEM_DEFS = {
  invincible: { emoji: '💛', label: '無敵5秒',   color: '#f4c875', duration: 300 },
  hitReduce:  { emoji: '💙', label: '判定縮小8秒', color: '#7ad4e8', duration: 480 },
  scoreDouble:{ emoji: '❤️', label: 'スコア2倍10秒', color: '#e87ad4', duration: 600 },
  clearBullet:{ emoji: '💜', label: '弾消去',     color: '#c87ae8', duration: 0   },
};

// アイテムドロップ (画面上を流れるアイテム)
let dropItems = [];
// アイテムストック [スロット0〜2]
let itemStock = [null, null, null];
// アクティブ効果
let activeEffects = {}; // { type: remainingFrames }

let itemSpawnTimer = 0;
const ITEM_SPAWN_INTERVAL = 600;

const itemTypes = Object.keys(ITEM_DEFS);

for(let i = 0; i < 120; i++) {
  stars.push({ x: Math.random()*gameW, y: Math.random()*gameH, s: Math.random()*1.5+0.3, sp: Math.random()*0.4+0.1 });
}

const patterns = [
  { name: 'Spread Shot', color: '#e87ad4', gen: spreadShot },
  { name: 'Ring Burst', color: '#7ad4e8', gen: ringBurst },
  { name: 'Spiral', color: '#d4e87a', gen: spiralShot },
  { name: 'Aimed Barrage', color: '#e8a87a', gen: aimedBarrage },
  { name: 'Laser Curtain', color: '#a87ae8', gen: laserCurtain },
  { name: 'Double Helix', color: '#7ae8a8', gen: doubleHelix },
];


const playerImg = new Image();
playerImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
function initGame() {
  bgm.currentTime = 0;
  bgm.play();
  player = { x: gameW/2, y: gameH - 80, r: 4, hitR: 4 };
  bullets = [];
  dropItems = [];
  itemStock = [null, null, null];
  activeEffects = {};
  score = 0; graze = 0; lives = 3; frame = 0;
  gameTime = 0;
  phaseTimer = 0; phase = 0;
  bossX = gameW/2; bossY = 100; bossVX = 0.8;
  bossHP = 600; bossMaxHP = 600;
  invincible = 0; deathFlash = 0;
  itemSpawnTimer = 0;
  bossPattern = patterns[0];
  bossColor = bossPattern.color;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('graze-label').style.display = 'block';
  updateUI();
  updateItemStockUI();
  updateEffectDisplay();
  // キャンバスの寸法を改めて確認
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT;
  
  // グローバル定数を更新（ボス・プレイヤー初期位置など）
  state = 'play';
}

// ===== アイテム取得・発動 =====
function addToStock(type) {
  for(let i = 0; i < 3; i++) {
    if(itemStock[i] === null) {
      itemStock[i] = type;
      updateItemStockUI();
      showPickupFlash(ITEM_DEFS[type]);
      return;
    }
  }
  // 満杯ならスコアに変換
  score += 1000;
}

function useItem(slotIndex) {
  if(state !== 'play') return;
  const type = itemStock[slotIndex];
  if(!type) return;

  const def = ITEM_DEFS[type];
  itemStock[slotIndex] = null;

  if(type === 'clearBullet') {
    // 即時弾消去＋スコアボーナス
    score += bullets.length * 50;
    bullets = [];
    spawnClearEffect();
  } else {
    // 効果を付与（重複は延長）
    activeEffects[type] = (activeEffects[type] || 0) + def.duration;
  }

  updateItemStockUI();
  updateEffectDisplay();
}

function updateItemStockUI() {
  for(let i = 0; i < 3; i++) {
    const btn = document.getElementById('item-btn-' + i);
    const lbl = document.getElementById('item-label-' + i);
    const type = itemStock[i];
    if(type) {
      const def = ITEM_DEFS[type];
      btn.textContent = def.emoji;
      btn.className = 'item-btn active';
      btn.style.borderColor = def.color + 'aa';
      btn.style.boxShadow = '0 0 8px ' + def.color + '55';
      lbl.textContent = def.label;
      lbl.style.color = def.color;
    } else {
      btn.textContent = '—';
      btn.className = 'item-btn empty';
      btn.style.borderColor = '';
      btn.style.boxShadow = '';
      lbl.textContent = '空き';
      lbl.style.color = 'rgba(255,255,255,0.3)';
    }
  }
}

function updateEffectDisplay() {
  const el = document.getElementById('effect-display');
  el.innerHTML = '';
  for(const [type, rem] of Object.entries(activeEffects)) {
    if(rem <= 0) continue;
    const def = ITEM_DEFS[type];
    const sec = (rem / 60).toFixed(1);
    const badge = document.createElement('div');
    badge.className = 'effect-badge';
    badge.style.background = def.color + 'aa';
    badge.style.border = '1px solid ' + def.color;
    badge.textContent = def.emoji + ' ' + def.label.split('秒')[0] + '  残' + sec + 's';
    el.appendChild(badge);
  }
}

// 弾消去エフェクト用
let clearEffectTimer = 0;
function spawnClearEffect() { clearEffectTimer = 40; }

// 取得フラッシュ用
let pickupFlash = null;
function showPickupFlash(def) {
  pickupFlash = { emoji: def.emoji, color: def.color, timer: 60 };
}

// ===== アイテムドロップスポーン =====
function spawnDropItem() {
  const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
  const def = ITEM_DEFS[type];
  dropItems.push({
    type, x: 40 + Math.random() * (gameW - 80), y: -20,
    vy: 1.2 + Math.random() * 0.8,
    vx: (Math.random() - 0.5) * 0.5,
    color: def.color, emoji: def.emoji,
    r: 14, pulse: Math.random() * Math.PI * 2
  });
}

// ===== ボスパターン =====
function spreadShot() {
  if(frame % 20 === 0) {
    for(let a = -40; a <= 40; a += 8) {
      let rad = (90 + a) * Math.PI / 180;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(rad)*2.8, vy: Math.sin(rad)*2.8, r: 5, color: bossColor, type: 'o' });
    }
  }
  if(frame % 60 === 0) {
    for(let i = 0; i < 24; i++) {
      let a = (i/24)*Math.PI*2;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*1.5, vy: Math.sin(a)*1.5, r: 7, color: '#fff', type: 'o', glow: true });
    }
  }
}

function ringBurst() {
  if(frame % 30 === 0) {
    let n = 16 + (phase*4);
    for(let i = 0; i < n; i++) {
      let a = (i/n)*Math.PI*2 + frame*0.02;
      let sp = 2.2 + (phase*0.3);
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: 4, color: bossColor, type: 'o' });
    }
  }
}

function spiralShot() {
  if(frame % 4 === 0) {
    let a = frame * 0.12;
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*2.5, vy: Math.sin(a)*2.5, r: 5, color: bossColor, type: 'o' });
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a+Math.PI)*2.5, vy: Math.sin(a+Math.PI)*2.5, r: 5, color: '#f4c875', type: 'o' });
  }
  if(frame % 50 === 0) {
    let dx = player.x - bossX, dy = player.y - bossY;
    let len = Math.sqrt(dx*dx+dy*dy);
    bullets.push({ x: bossX, y: bossY+30, vx: dx/len*3.5, vy: dy/len*3.5, r: 6, color: '#fff', type: 'o', aimed: true });
  }
}

function aimedBarrage() {
  if(frame % 12 === 0) {
    let dx = player.x - bossX, dy = player.y - bossY;
    let len = Math.sqrt(dx*dx+dy*dy);
    let spread = 0.25;
    for(let i = -2; i <= 2; i++) {
      let angle = Math.atan2(dy, dx) + i * spread;
      let sp = 2.5 + Math.abs(i)*0.2;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(angle)*sp, vy: Math.sin(angle)*sp, r: 5, color: bossColor, type: 'o' });
    }
  }
}

function laserCurtain() {
  if(frame % 6 === 0) {
    let offset = Math.sin(frame*0.04)*120;
    let cols = 7 + phase;
    for(let i = 0; i < cols; i++) {
      let x = (gameW/(cols))*i + gameW/(cols*2) + offset*0.3;
      bullets.push({ x, y: bossY+30, vx: 0, vy: 2.8+phase*0.4, r: 6, color: bossColor, type: 'o' });
    }
  }
  if(frame % 40 === 0) {
    for(let i = 0; i < 20; i++) {
      let a = (i/20)*Math.PI*2;
      bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a)*3, vy: Math.sin(a)*3, r: 4, color: '#fff', type: 'o', glow: true });
    }
  }
}

function doubleHelix() {
  if(frame % 5 === 0) {
    let a1 = frame * 0.08;
    let a2 = frame * 0.08 + Math.PI;
    let sp = 2.4;
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a1)*sp, vy: Math.sin(a1)*sp, r: 5, color: bossColor, type: 'o' });
    bullets.push({ x: bossX, y: bossY+30, vx: Math.cos(a2)*sp, vy: Math.sin(a2)*sp, r: 5, color: '#7ad4e8', type: 'o' });
    if(frame % 20 === 0) {
      let dx = player.x - bossX, dy = player.y - bossY;
      let len = Math.sqrt(dx*dx+dy*dy);
      bullets.push({ x: bossX, y: bossY+30, vx: dx/len*4, vy: dy/len*4, r: 4, color: '#f4c875', type: 'o' });
    }
  }
}

function dist(a, b) {
  let dx = a.x-b.x, dy = a.y-b.y;
  return Math.sqrt(dx*dx+dy*dy);
}

// ===== UPDATE =====
function update() {
  if(state !== 'play') return;
  frame++;
  gameTime++;
  phaseTimer++;

  // アイテムスポーン
  itemSpawnTimer++;
  if(itemSpawnTimer >= ITEM_SPAWN_INTERVAL) {
    itemSpawnTimer = 0;
    spawnDropItem();
  }

  // アクティブ効果タイマー更新
  let effectChanged = false;
  for(const type of Object.keys(activeEffects)) {
    activeEffects[type]--;
    if(activeEffects[type] <= 0) { delete activeEffects[type]; effectChanged = true; }
    else effectChanged = true;
  }
  if(effectChanged) updateEffectDisplay();

  // 現在の当たり判定半径（hitReduce効果中は縮小）
  player.hitR = activeEffects['hitReduce'] ? 1 : 4;

  // フェーズ切り替え
  let phaseDuration = 400;
  if(phaseTimer > phaseDuration) {
    phaseTimer = 0;
    phase = (phase + 1) % patterns.length;
    bossPattern = patterns[phase];
    bossColor = bossPattern.color;
    bullets = [];
  }

  bossX += bossVX * (1 + phase*0.15);
  if(bossX > gameW - 60 || bossX < 60) bossVX *= -1;
  bossY = 90 + Math.sin(frame*0.02)*20;

  bossHP = Math.max(0, bossHP - 0.15);
  document.getElementById('boss-bar').style.width = (bossHP/bossMaxHP*100) + '%';

  if(bossHP <= 0) {
    bossHP = 600; bossMaxHP = 600;
    score += 5000;
    bullets = [];
    phase = (phase+1) % patterns.length;
    bossPattern = patterns[phase];
    bossColor = bossPattern.color;
  }

  bossPattern.gen();

  // ドロップアイテム更新
  for(let di of dropItems) {
    di.x += di.vx; di.y += di.vy;
    di.pulse += 0.08;
    // プレイヤーとの当たり判定
    let d = dist(player, di);
    if(d < player.r + di.r) {
      addToStock(di.type);
      di._collected = true;
    }
  }
  dropItems = dropItems.filter(di => !di._collected && di.y < gameH + 30);

  bullets = bullets.filter(b => b.x > -20 && b.x < gameW+20 && b.y > -20 && b.y < gameH+20);
  for(let b of bullets) { b.x += b.vx; b.y += b.vy; }

  // プレイヤー移動
  let speed = shift ? 1.6 : 3.8;
  const up    = keys['ArrowUp']    || keys['KeyW'];
  const down  = keys['ArrowDown']  || keys['KeyS'];
  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const usingKeyboard = up || down || left || right;

  if(usingKeyboard) {
    const diag = (up || down) && (left || right) ? speed / Math.SQRT2 : speed;
    if(up)    player.y -= diag;
    if(down)  player.y += diag;
    if(left)  player.x -= diag;
    if(right) player.x += diag;
    mouseX = player.x; mouseY = player.y;
  } else {
    let dx = mouseX - player.x, dy = mouseY - player.y;
    let d = Math.sqrt(dx*dx+dy*dy);
    if(d > speed) { player.x += dx/d*speed; player.y += dy/d*speed; }
    else { player.x = mouseX; player.y = mouseY; }
  }
  player.x = Math.max(12, Math.min(gameW-12, player.x));
  player.y = Math.max(12, Math.min(gameH-12, player.y));

  // 弾との判定
  const isInvincible = invincible > 0 || !!activeEffects['invincible'];
  if(!isInvincible) {
    for(let b of bullets) {
      let dd = dist(player, b);
      if(dd < player.hitR + 2) {
        lives--;
        bullets = [];
        invincible = 120;
        deathFlash = 20;
        updateUI();
        if(lives <= 0) {
          state = 'dead';
          bgm.pause();
          showOverlay('ゲームオーバー', `SCORE: ${score.toLocaleString()} / かすり: ${graze}`, '再挑戦');
        }
        break;
      } else if(dd < b.r + 14) {
        graze++;
        const scoreAdd = activeEffects['scoreDouble'] ? 20 : 10;
        score += scoreAdd;
        b._grazed = true;
      }
    }
  } else {
    if(invincible > 0) invincible--;
  }

  const baseScore = 1;
  score += activeEffects['scoreDouble'] ? baseScore * 2 : baseScore;
  if(frame % 60 === 0) updateUI();

  // エフェクトタイマー
  if(clearEffectTimer > 0) clearEffectTimer--;
  if(pickupFlash && pickupFlash.timer > 0) pickupFlash.timer--;
}

function updateUI() {
  document.getElementById('score-val').textContent = score.toLocaleString();
  document.getElementById('graze-val').textContent = graze;
  document.getElementById('graze-inner').textContent = graze;
  let seconds = Math.floor(gameTime / 60);
  let minutes = Math.floor(seconds / 60);
  seconds = seconds % 60;
  let timeStr = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  document.getElementById('time-val').textContent = timeStr;
  for(let i = 0; i < 3; i++) {
    document.getElementById('l'+i).style.opacity = i < Math.max(0, lives) ? '1' : '0.15';
  }
}

function showOverlay(title, msg, btn) {
  let ov = document.getElementById('overlay');
  const gameUrl   = "https://dayu-otya.github.io/poporindd/";
  const shareText = `【ぽぽりんの弾幕避け】\nSCORE: ${score.toLocaleString()} \nかすり: ${graze}\n時間: ${document.getElementById('time-val').textContent}\n${gameUrl}\n#ポポと岐阜\n#ぽぽりん`;
  const encoded   = encodeURIComponent(shareText);
  const xUrl       = `https://twitter.com/intent/tweet?text=${encoded}`;
  const bskyUrl    = `https://bsky.app/intent/compose?text=${encoded}`;
  const Karotter   = `https://karotter.com/?compose=1=${encoded}`;

  ov.innerHTML = `
    <h2>${title}</h2>
    <p style="white-space:pre-line">${msg}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px">
      <a href="${xUrl}"    target="_blank" rel="noopener" style="${btnStyle('#000')}">𝕏 でシェア</a>
      <a href="${bskyUrl}" target="_blank" rel="noopener" style="${btnStyle('#0085ff')}">🦋 Bluesky</a>
      <a href="${Karotter}" target="_blank" rel="noopener" style="${btnStyle('#0077ca')}">🗾 Karotter</a>
    </div>
    <button id="start-btn">${btn}</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('start-btn').onclick = initGame;
}

function btnStyle(bg) {
  return `display:inline-block;padding:7px 16px;background:${bg};color:#fff;`
       + `border-radius:6px;font-size:13px;text-decoration:none;border:none;cursor:pointer;`;
}

// ===== DRAW =====
function drawBoss() {
  let t = frame;
  ctx.save();
  ctx.translate(bossX, bossY);
  let aura = ctx.createRadialGradient(0,0,10, 0,0,55);
  aura.addColorStop(0, bossColor+'40');
  aura.addColorStop(1, 'transparent');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(0,0,55,0,Math.PI*2); ctx.fill();
  ctx.save();
  ctx.rotate(Math.sin(t*0.03)*0.15);
  for(let s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1);
    ctx.beginPath(); ctx.moveTo(0, -10);
    ctx.bezierCurveTo(40, -40, 80, 0, 50, 30);
    ctx.bezierCurveTo(30, 50, 10, 20, 0, 10);
    ctx.fillStyle = bossColor + '55'; ctx.strokeStyle = bossColor + 'aa'; ctx.lineWidth = 1;
    ctx.fill(); ctx.stroke(); ctx.restore();
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = bossColor; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#1a0a2a';
  ctx.beginPath(); ctx.arc(-5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = bossColor;
  ctx.beginPath(); ctx.arc(-5+Math.sin(t*0.05), -3+Math.cos(t*0.04)*0.5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5+Math.sin(t*0.05), -3+Math.cos(t*0.04)*0.5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 3, 5, 0.1, Math.PI-0.1); ctx.stroke();
  ctx.restore();
  let pl = document.getElementById('phase-label');
  pl.style.display = 'block';
  pl.textContent = bossPattern.name;
}

function drawPlayer() {
  let t = frame;
  ctx.save();
  ctx.translate(player.x, player.y);

  const invincAnim = invincible > 0 && Math.floor(invincible/4) % 2 === 0;
  if(invincAnim) { ctx.restore(); return; }

    // 画像
  ctx.drawImage(playerImg, -24, -24, 48, 48);

  // 緑のかすり判定エリア
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI*2);  // かすり判定半径 14px
  ctx.fill();

  // 赤い当たり判定
  ctx.strokeStyle = 'rgba(255,60,60,0.9)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, player.hitR, 0, Math.PI*2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,60,60,0.9)';
  ctx.beginPath();
  ctx.arc(0, 0, 1.5, 0, Math.PI*2);
  ctx.fill();
  
  // ④スロー中のフォーカスリング（さらに上）
  if(shift) {
    ctx.strokeStyle = 'rgba(180,220,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0,0,24,0,Math.PI*2);
    ctx.stroke();
    ctx.save();
    ctx.rotate(t*0.05);
    ctx.strokeStyle = 'rgba(180,220,255,0.7)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(0,0,12,0,Math.PI*2);
    ctx.stroke();
    for(let i=0;i<4;i++){
      let a = (i/4)*Math.PI*2;
      ctx.fillStyle='rgba(180,220,255,0.8)';
      ctx.beginPath();
      ctx.arc(Math.cos(a)*12, Math.sin(a)*12, 2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();
}

function drawDropItems() {
  for(let di of dropItems) {
    let glow = 0.6 + Math.sin(di.pulse) * 0.4;
    ctx.save();
    ctx.translate(di.x, di.y);
    // 光輪
    let aura = ctx.createRadialGradient(0,0,2, 0,0,di.r+6);
    aura.addColorStop(0, di.color + 'aa');
    aura.addColorStop(1, 'transparent');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(0,0,di.r+6,0,Math.PI*2); ctx.fill();
    // 本体
    ctx.beginPath(); ctx.arc(0,0,di.r,0,Math.PI*2);
    ctx.fillStyle = '#1a0a2a';
    ctx.fill();
    ctx.strokeStyle = di.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = di.color; ctx.shadowBlur = 8 * glow;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // 絵文字
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(di.emoji, 0, 0);
    ctx.restore();
  }
}

function drawBullets() {
  for(let b of bullets) {
    ctx.save();
    if(b._grazed) { ctx.shadowColor = b.color; ctx.shadowBlur = 6; }
    if(b.glow)    { ctx.shadowColor = '#fff';  ctx.shadowBlur = 8; }
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r*0.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawClearEffect() {
  if(clearEffectTimer <= 0) return;
  let p = clearEffectTimer / 40;
  ctx.save();
  ctx.fillStyle = `rgba(180,100,240,${p*0.35})`;
  ctx.fillRect(0,0,gameW,gameH);
  // 放射状ライン
  ctx.strokeStyle = `rgba(200,130,255,${p*0.7})`;
  ctx.lineWidth = 2;
  for(let i = 0; i < 12; i++) {
    let a = (i/12)*Math.PI*2;
    let len = (1 - p) * 280 + 20;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x + Math.cos(a)*len, player.y + Math.sin(a)*len);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPickupFlash() {
  if(!pickupFlash || pickupFlash.timer <= 0) return;
  let p = pickupFlash.timer / 60;
  ctx.save();
  ctx.font = `${20 + (1-p)*10}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = p;
  ctx.shadowColor = pickupFlash.color; ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  ctx.fillText(pickupFlash.emoji + ' GET!', player.x, player.y - 30 - (1-p)*20);
  ctx.restore();
}

function drawStars() {
  for(let s of stars) {
    s.y += s.sp;
    if(s.y > gameH) s.y = 0;
    ctx.fillStyle = `rgba(255,255,255,${0.3+s.s*0.3})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s*0.6, 0, Math.PI*2); ctx.fill();
  }
}

function drawDeathFlash() {
  if(deathFlash > 0) {
    ctx.fillStyle = `rgba(255,100,180,${deathFlash/20*0.5})`;
    ctx.fillRect(0,0,gameW,gameH);
    deathFlash--;
  }
}

// スコア2倍中の画面端テキスト
function drawScoreDoubleIndicator() {
  if(!activeEffects['scoreDouble']) return;
  ctx.save();
  ctx.font = 'bold 11px system-ui';
  ctx.fillStyle = '#e87ad4';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = '#e87ad4'; ctx.shadowBlur = 6;
  ctx.fillText('×2 SCORE', gameW - 10, gameH - 36);
  ctx.restore();
}

function render() {
  ctx.clearRect(0,0,gameW,gameH);
  ctx.fillStyle = '#020615';
  ctx.fillRect(0,0,gameW,gameH);
  drawStars();
  if(state === 'play') {
    drawBoss();
    drawBullets();
    drawDropItems();
    drawPlayer();
    drawDeathFlash();
    drawClearEffect();
    drawPickupFlash();
    drawScoreDoubleIndicator();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ===== イベント =====
// デバイス選択ボタン
document.getElementById('select-pc-btn').addEventListener('click', () => {
  setDeviceMode('pc');
  showGameStartScreen('PC版ゲーム');
});

document.getElementById('select-mobile-btn').addEventListener('click', () => {
  setDeviceMode('mobile');
  showGameStartScreen('モバイル版ゲーム');
});

function showGameStartScreen(modeLabel) {
  document.getElementById('device-select-screen').style.display = 'none';
  document.getElementById('game-start-screen').style.display = 'flex';
  document.getElementById('game-start-text').textContent = 
    `${modeLabel} を開始します。\nマウス・キーボード・タッチで操作！`;
  document.getElementById('start-btn').onclick = initGame;
}
canvas.addEventListener('mousemove', e => {
  let r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (gameW / r.width);
  mouseY = (e.clientY - r.top) * (gameH / r.height);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  let r = canvas.getBoundingClientRect();
  let t = e.touches[0];
  mouseX = (t.clientX - r.left) * (gameW / r.width);
  mouseY = (t.clientY - r.top) * (gameH / r.height);
}, { passive: false });

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') shift = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  // 数字キー 1〜3 でアイテム発動
  if(e.code === 'Digit1') useItem(0);
  if(e.code === 'Digit2') useItem(1);
  if(e.code === 'Digit3') useItem(2);
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') shift = false;
});

document.getElementById('start-btn').onclick = initGame;
document.getElementById('start-btn').addEventListener('click', () => {
  bgm.currentTime = 0;
  bgm.play();
});
bgm.volume = 0.5;
document.getElementById('vol-slider').addEventListener('input', e => {
  bgm.volume = parseFloat(e.target.value);
});
loop();
window.addEventListener('resize', () => {
  if(deviceMode !== 'mobile') return;
  
  // 向きが変わったことを検出
  const newW = window.innerWidth;
  
  if(gameW !== newW && state === 'play') {
    // ゲームを一時停止
    const wasPlaying = state === 'play';
    state = 'paused';
    
    // キャンバス更新
    gameW = newW;
    gameH = newW * (560 / 480);
    canvas.width = gameW;
    canvas.height = gameH;
    
    // 再開ボタンを表示
    showPauseOverlay(wasPlaying);
  }
});

function showPauseOverlay(wasPlaying) {
  let ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>一時停止</h2>
    <p>デバイスが回転しました。<br>ゲームを再開しますか？</p>
    <button id="resume-btn" style="padding:10px 28px;font-size:14px;cursor:pointer;border:0.5px solid rgba(200,160,255,0.6);background:rgba(120,80,200,0.3);color:#dcd;border-radius:8px;">
      再開する
    </button>
  `;
  ov.style.display = 'flex';
  
  document.getElementById('resume-btn').onclick = () => {
    ov.style.display = 'none';
    state = 'play';
  };
}
</script>
